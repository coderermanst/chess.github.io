<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take King Chess - Ultimate Sandbox Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { margin-bottom: 5px; }
        p { margin-top: 0; color: #bdc3c7; text-align: center; max-width: 500px;}
        
        #config-panel {
            background-color: #34495e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            width: 520px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .config-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            align-items: center;
            gap: 10px;
        }
        .config-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .config-group label {
            font-size: 0.85rem;
            color: #bdc3c7;
            margin-bottom: 4px;
            font-weight: bold;
        }
        select {
            padding: 8px;
            border-radius: 4px;
            border: none;
            width: 100%;
            font-size: 0.9rem;
            background: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
            cursor: pointer;
            box-sizing: border-box;
        }

        #level-container {
            background-color: #34495e;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
            width: 520px;
            box-sizing: border-box;
        }
        #level-slider {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        #level-desc {
            font-size: 0.95rem;
            color: #f1c40f;
            min-height: 40px;
            font-weight: bold;
        }

        #status {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2ecc71;
            background-color: #34495e;
            padding: 6px 20px;
            border-radius: 4px;
        }
        
        #board-wrapper {
            position: relative;
        }

        #chessboard {
            display: grid;
            border: 5px solid #34495e;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
        }

        #arrow-svg {
            position: absolute;
            top: 5px;
            left: 5px;
            pointer-events: none;
            z-index: 5;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            cursor: pointer;
            position: relative;
        }
        .light { background-color: #e0e4e8; }
        .dark { background-color: #88929a; }
        
        .slippery::after {
            content: '🧊';
            font-size: 12px;
            position: absolute;
            top: 2px;
            right: 2px;
            opacity: 0.7;
            z-index: 1;
        }
        .slipped-piece {
            opacity: 0.4 !important;
            filter: grayscale(100%) contrast(150%) drop-shadow(0px 0px 8px #3498db) !important;
        }

        .piece {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: grab;
            position: relative;
        }
        .piece:active { cursor: grabbing; }
        
        .piece-w { color: #ffffff; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.75)); }
        .piece-b { color: #111111; filter: drop-shadow(0px 2px 2px rgba(255,255,255,0.2)); }
        
        .selected { background-color: #2ecc71 !important; }
        .highlighted::before {
            content: '';
            width: 16px;
            height: 16px;
            background-color: rgba(46, 204, 113, 0.6);
            border-radius: 50%;
            position: absolute;
            z-index: 2;
            pointer-events: none;
        }

        #replay-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            background-color: #34495e;
            border: 2px dashed #f1c40f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            width: 520px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .replay-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .replay-btn {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background-color: #2c3e50;
            color: #f1c40f;
            border: 1px solid #f1c40f;
        }
        .replay-btn:hover:not(:disabled) {
            background-color: #f1c40f;
            color: #2c3e50;
        }
        .replay-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #7f8c8d;
            color: #7f8c8d;
        }
        #replay-counter {
            font-size: 1rem;
            font-weight: bold;
            color: #ecf0f1;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Take King Chess</h1>
    <p>Choose your ruleset via the slider, then pit yourself against multiple tiers of tactical AI optimization matrices.</p>
    
    <div id="config-panel">
        <div class="config-row">
            <div class="config-group">
                <label for="mode-select">Opponent Mode</label>
                <select id="mode-select">
                    <option value="ai">Vs. Computer AI</option>
                    <option value="local">Local Pass & Play</option>
                </select>
            </div>
            <div class="config-group" id="ai-difficulty-group">
                <label for="ai-diff-select">AI Difficulty</label>
                <select id="ai-diff-select">
                    <option value="novice">Novice (Random Moves)</option>
                    <option value="casual">Casual (Immediate Threat Only)</option>
                    <option value="master" selected>Master (Depth 3 Search)</option>
                    <option value="grandmaster">Grandmaster (Depth 4 Deep Engine)</option>
                </select>
            </div>
            <button id="reset-btn" style="padding: 8px 15px; height: 36px; margin-top: 18px; border-radius:4px; border:none; background:#e67e22; color:white; font-weight:bold; cursor:pointer; white-space: nowrap;">Restart Game</button>
        </div>
    </div>

    <div id="level-container">
        <label for="level-slider" style="font-weight: bold; font-size: 1.1rem;">Game Rule Level: <span id="level-val">1</span></label>
        <input type="range" id="level-slider" min="1" max="10" value="1">
        <div id="level-desc">Level 1: Normal Chess. Standard movement rules apply.</div>
    </div>

    <div id="status">White's Turn</div>
    
    <div id="board-wrapper">
        <div id="chessboard"></div>
        <svg id="arrow-svg">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="6" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="rgba(230, 126, 34, 0.85)" />
                </marker>
            </defs>
        </svg>
    </div>

    <div id="replay-panel">
        <div id="replay-counter">Reviewing Move: 0 / 0</div>
        <div class="replay-buttons">
            <button class="replay-btn" id="btn-first">First Move</button>
            <button class="replay-btn" id="btn-prev">◀ Back</button>
            <button class="replay-btn" id="btn-next">Next ▶</button>
            <button class="replay-btn" id="btn-last">Last ⏭</button>
        </div>
    </div>

    <script>
        const boardElem = document.getElementById('chessboard');
        const statusElem = document.getElementById('status');
        const levelSlider = document.getElementById('level-slider');
        const levelValDisplay = document.getElementById('level-val');
        const levelDescDisplay = document.getElementById('level-desc');
        const modeSelect = document.getElementById('mode-select');
        const aiDiffSelect = document.getElementById('ai-diff-select');
        const aiDifficultyGroup = document.getElementById('ai-difficulty-group');
        const resetBtn = document.getElementById('reset-btn');
        const arrowSvg = document.getElementById('arrow-svg');

        const replayPanel = document.getElementById('replay-panel');
        const replayCounter = document.getElementById('replay-counter');
        const btnFirst = document.getElementById('btn-first');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnLast = document.getElementById('btn-last');

        const symbols = {
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'G': '🛡️',
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'g': '🛡️'
        };

        let currentLevel = 1;
        let isAiMode = true; 

        const levelDescriptions = {
            1: "Level 1: Normal Chess. Standard movement rules apply.",
            2: "Level 2: Goblin Pawns! Pawns move 1 or 2 squares forward or diagonally, jumping completely over obstacles.",
            3: "Level 3: Horse Queens. The traditional Queen transforms completely into an agile Knight-Queen compound construct.",
            4: "Level 4: Phantom Rooks. Heavy Siege Castles gain the dimensional ability to jump obstacles natively like Knights.",
            5: "Level 5: Kinetic Bishops. Clergy track vectors that rebound off the boundaries of the board matrix to bank paths.",
            6: "Level 6: Perilous Ice. Random tiles look slippery. Landing freezes pieces: they cannot capture and require 1 turn to stabilize.",
            7: "Level 7: Sovereign Swap. The Monarch rules space, enjoying capability to swap coordinate matrices safely with any ally.",
            8: "Level 8: Blitz Chargers. Horses harness double energy output, allowing them to jump twice as far as traditional Knights.",
            9: "Level 9: The Grand Arena. Grid size safely expands to 10x10. Introduces the Guardian (G), who drops out of nowhere directly in front of your own pieces and can take enemy units.",
            10: "Level 10: Absolute Armageddon! All structural rules, variant configurations, and size scales mesh into one singular sandbox."
        };

        let board = [];
        let boardSize = 8;
        let itemSlippedState = [];
        let iceLayout = [];

        let turn = 'w'; 
        let selected = null; 
        let gameOver = false;
        let isAnimating = false; 

        let activeArrows = [];
        let drawingStartCell = null;

        let gameHistory = [];
        let replayIndex = 0;
        let isReplaying = false;

        function saveHistoryState() {
            gameHistory.push({
                boardState: board.map(row => [...row]),
                slippedState: itemSlippedState.map(row => [...row]),
                activeTurn: turn
            });
        }

        function initializeGame() {
            boardSize = (currentLevel === 9 || currentLevel === 10) ? 10 : 8;
            isAiMode = (modeSelect.value === 'ai');
            
            if (isAiMode) {
                aiDifficultyGroup.style.display = 'flex';
            } else {
                aiDifficultyGroup.style.display = 'none';
            }

            boardElem.style.gridTemplateColumns = `repeat(${boardSize}, 60px)`;
            boardElem.style.gridTemplateRows = `repeat(${boardSize}, 60px)`;
            const pixels = boardSize * 60;
            arrowSvg.setAttribute('width', pixels + 10);
            arrowSvg.setAttribute('height', pixels + 10);
            arrowSvg.style.width = (pixels + 10) + 'px';
            arrowSvg.style.height = (pixels + 10) + 'px';

            if (boardSize === 10) {
                board = [
                    ['r','n','b','q','k','g','g','b','n','r'],
                    ['p','p','p','p','p','p','p','p','p','p'],
                    ['','','','','','','','','',''],
                    ['','','','','','','','','',''],
                    ['','','','','','','','','',''],
                    ['','','','','','','','','',''],
                    ['','','','','','','','','',''],
                    ['','','','','','','','','',''],
                    ['P','P','P','P','P','P','P','P','P','P'],
                    ['R','N','B','Q','K','G','G','B','N','R']
                ];
            } else {
                board = [
                    ['r','n','b','q','k','b','n','r'],
                    ['p','p','p','p','p','p','p','p'],
                    ['','','','','','','',''],
                    ['','','','','','','',''],
                    ['','','','','','','',''],
                    ['','','','','','','',''],
                    ['P','P','P','P','P','P','P','P'],
                    ['R','N','B','Q','K','B','N','R']
                ];
            }

            turn = 'w';
            selected = null;
            gameOver = false;
            isReplaying = false;
            isAnimating = false;
            activeArrows = [];
            redrawArrows();
            gameHistory = [];
            replayPanel.style.display = 'none';
            
            itemSlippedState = Array(boardSize).fill(null).map(() => Array(boardSize).fill(null));
            iceLayout = Array(boardSize).fill(null).map(() => Array(boardSize).fill(false));
            
            if (currentLevel === 6 || currentLevel === 10) {
                let spaces = boardSize === 10 ? [[3,3], [3,6], [4,4], [4,5], [5,4], [5,5], [6,3], [6,6]] : [[2,2], [2,5], [3,3], [3,4], [4,3], [4,4], [5,2], [5,5]];
                spaces.forEach(([r,c]) => { iceLayout[r][c] = true; });
            }
            
            saveHistoryState();
            updateStatusMessage();
            drawBoard();
        }

        function updateStatusMessage() {
            if (isReplaying) {
                statusElem.textContent = "Reviewing Sandbox Match Replay";
                statusElem.style.color = "#f1c40f";
                return;
            }
            if (gameOver) return;
            
            let turnTxt = (turn === 'w') ? "White's Turn" : "Black's Turn";
            if (isAiMode && turn === 'b') {
                statusElem.textContent = "Computer is calculating options...";
                statusElem.style.color = "#e74c3c";
            } else {
                statusElem.textContent = turnTxt;
                statusElem.style.color = "#2ecc71";
            }
        }

        function drawBoard() {
            boardElem.innerHTML = '';
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell', (r + c) % 2 === 0 ? 'light' : 'dark');
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (iceLayout[r][c]) cell.classList.add('slippery');

                    cell.addEventListener('dragover', onDragOver);
                    cell.addEventListener('drop', onDrop);
                    cell.addEventListener('mousedown', onSquareMouseDown);
                    cell.addEventListener('mouseup', onSquareMouseUp);

                    const pieceType = board[r][c];
                    if (pieceType) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.classList.add('piece');
                        pieceDiv.textContent = symbols[pieceType];
                        
                        const isWhite = pieceType === pieceType.toUpperCase();
                        pieceDiv.classList.add(isWhite ? 'piece-w' : 'piece-b');
                        
                        if (itemSlippedState[r][c] !== null) pieceDiv.classList.add('slipped-piece');
                        
                        const allowableTurn = (turn === 'w' && isWhite) || (turn === 'b' && !isWhite);
                        const blockAiDrag = isAiMode ? (turn === 'w') : true;

                        if (!gameOver && !isReplaying && !isAnimating && allowableTurn && blockAiDrag && itemSlippedState[r][c] === null) {
                            pieceDiv.setAttribute('draggable', 'true');
                            pieceDiv.addEventListener('dragstart', (e) => onDragStart(e, r, c));
                        }
                        
                        cell.appendChild(pieceDiv);
                    }
                    boardElem.appendChild(cell);
                }
            }
        }

        levelSlider.addEventListener('input', (e) => {
            currentLevel = parseInt(e.target.value);
            levelValDisplay.textContent = currentLevel;
            levelDescDisplay.textContent = levelDescriptions[currentLevel];
            initializeGame();
        });

        modeSelect.addEventListener('change', () => { initializeGame(); });
        
        aiDiffSelect.addEventListener('change', () => { 
            if (isAiMode && turn === 'b' && !gameOver && !isAnimating && !isReplaying) {
                triggerAiCalculation();
            }
        });
        
        resetBtn.addEventListener('click', () => { initializeGame(); });

        function onDragStart(e, r, c) {
            if (gameOver || isReplaying || isAnimating) { e.preventDefault(); return; }
            if (isAiMode && turn === 'b') { e.preventDefault(); return; }
            selectPiece(r, c);
        }

        function onDragOver(e) { e.preventDefault(); }

        function onDrop(e) {
            e.preventDefault();
            if (isReplaying || isAnimating) return;
            const cell = e.currentTarget;
            attemptMove(parseInt(cell.dataset.row), parseInt(cell.dataset.col));
        }

        function onSquareMouseDown(e) {
            const cell = e.currentTarget;
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);

            if (e.button === 2) { 
                drawingStartCell = { r, c };
            } else if (e.button === 0) { 
                if (activeArrows.length > 0) {
                    activeArrows = [];
                    redrawArrows();
                }

                if (gameOver || isReplaying || isAnimating) return;
                if (isAiMode && turn === 'b') return;

                if (selected) {
                    if (attemptMove(r, c)) return;
                }
                
                const piece = board[r][c];
                if (!piece) { selected = null; clearHighlights(); return; }
                
                const isWhitePiece = piece === piece.toUpperCase();
                if (((turn === 'w' && isWhitePiece) || (turn === 'b' && !isWhitePiece)) && itemSlippedState[r][c] === null) {
                    selectPiece(r, c);
                } else {
                    selected = null;
                    clearHighlights();
                }
            }
        }

        function onSquareMouseUp(e) {
            if (e.button === 2 && drawingStartCell) { 
                const cell = e.currentTarget;
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);

                if (drawingStartCell.r !== r || drawingStartCell.c !== c) {
                    const arrowEntry = { fromR: drawingStartCell.r, fromC: drawingStartCell.c, toR: r, toC: c };
                    const duplicateIndex = activeArrows.findIndex(a => a.fromR === arrowEntry.fromR && a.fromC === arrowEntry.fromC && a.toR === arrowEntry.toR && a.toC === arrowEntry.toC);
                    if (duplicateIndex !== -1) {
                        activeArrows.splice(duplicateIndex, 1);
                    } else {
                        activeArrows.push(arrowEntry);
                    }
                    redrawArrows();
                }
                drawingStartCell = null;
            }
        }

        function redrawArrows() {
            const elements = arrowSvg.querySelectorAll('line');
            elements.forEach(el => el.remove());

            activeArrows.forEach(arrow => {
                let x1 = arrow.fromC * 60 + 30;
                let y1 = arrow.fromR * 60 + 30;
                let x2 = arrow.toC * 60 + 30;
                let y2 = arrow.toR * 60 + 30;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                line.setAttribute('stroke', 'rgba(230, 126, 34, 0.85)');
                line.setAttribute('stroke-width', '5');
                line.setAttribute('marker-end', 'url(#arrowhead)');
                arrowSvg.appendChild(line);
            });
        }

        function selectPiece(r, c) {
            clearHighlights();
            selected = { r, c };
            document.querySelector(`[data-row="${r}"][data-col="${c}"]`)?.classList.add('selected');

            getLegalMoves(r, c, board).forEach(m => {
                document.querySelector(`[data-row="${m.toR}"][data-col="${m.toC}"]`)?.classList.add('highlighted');
            });
        }

        function attemptMove(r, c) {
            if (!selected) return false;
            const moves = getLegalMoves(selected.r, selected.c, board);
            const validMove = moves.find(m => m.toR === r && m.toC === c);

            if (validMove) {
                processSlipTurnRecovery(turn);
                animateAndExecuteMove(validMove);
                return true;
            }
            return false;
        }

        function animateAndExecuteMove(move) {
            isAnimating = true;
            selected = null;
            clearHighlights();
            activeArrows = [];
            redrawArrows();

            const fromCell = document.querySelector(`[data-row="${move.fromR}"][data-col="${move.fromC}"]`);
            const toCell = document.querySelector(`[data-row="${move.toR}"][data-col="${move.toC}"]`);
            const movingPieceElem = fromCell ? fromCell.querySelector('.piece') : null;

            if (movingPieceElem && fromCell && toCell) {
                const fromRect = fromCell.getBoundingClientRect();
                const toRect = toCell.getBoundingClientRect();
                
                let deltaX = toRect.left - fromRect.left;
                let deltaY = toRect.top - fromRect.top;

                movingPieceElem.style.transition = "transform 0.22s ease-out";
                
                let targetPieceElem = toCell.querySelector('.piece');
                if (move.type === 'swap' && targetPieceElem) {
                    targetPieceElem.style.transition = "transform 0.22s ease-out";
                    targetPieceElem.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`;
                } else if (targetPieceElem) {
                    targetPieceElem.style.transition = "opacity 0.12s ease";
                    targetPieceElem.style.opacity = "0";
                }

                movingPieceElem.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                movingPieceElem.addEventListener('transitionend', function handler() {
                    movingPieceElem.removeEventListener('transitionend', handler);
                    finalizeMoveState(move);
                });
            } else {
                finalizeMoveState(move);
            }
        }

        function finalizeMoveState(move) {
            executeMove(board, move);
            
            const pieceAtDestination = board[move.toR][move.toC];
            if (pieceAtDestination === 'P' && move.toR === 0) {
                board[move.toR][move.toC] = 'Q';
            } else if (pieceAtDestination === 'p' && move.toR === (boardSize - 1)) {
                board[move.toR][move.toC] = 'q';
            }

            saveHistoryState();
            isAnimating = false;

            if (!checkGameEnd()) {
                turn = (turn === 'w') ? 'b' : 'w';
                updateStatusMessage();
                drawBoard();

                if (isAiMode && turn === 'b') {
                    setTimeout(() => { triggerAiCalculation(); }, 200);
                }
            } else {
                activateReplayEngine();
                drawBoard();
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected', 'highlighted'));
        }

        function getLegalMoves(r, c, currentBoard) {
            const piece = currentBoard[r][c];
            if (!piece) return [];
            
            const moves = [];
            const isWhite = piece === piece.toUpperCase();
            const type = piece.toLowerCase();
            if (itemSlippedState[r][c] !== null) return []; 

            const rookDirs = [[1,0], [-1,0], [0,1], [0,-1]];
            const bishopDirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
            
            let knightOffsets = [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]];

            const lvl2 = (currentLevel === 2 || currentLevel === 10);
            const lvl3 = (currentLevel === 3 || currentLevel === 10);
            const lvl4 = (currentLevel === 4 || currentLevel === 10);
            const lvl5 = (currentLevel === 5 || currentLevel === 10);
            const lvl7 = (currentLevel === 7 || currentLevel === 10);
            const lvl8 = (currentLevel === 8 || currentLevel === 10);

            if (lvl8) {
                knightOffsets = knightOffsets.concat([[4,2],[4,-2],[-4,2],[-4,-2],[2,4],[2,-4],[-2,4],[-2,-4]]);
            }

            switch (type) {
                case 'p':
                    if (lvl2) {
                        const forward = isWhite ? -1 : 1;
                        const goblinOffsets = [[forward * 1, 0], [forward * 2, 0], [forward * 1, 1], [forward * 1, -1], [forward * 2, 2], [forward * 2, -2]];
                        goblinOffsets.forEach(([dr, dc]) => {
                            const targetR = r + dr, targetC = c + dc;
                            if (isOnBoard(targetR, targetC)) {
                                const target = currentBoard[targetR][targetC];
                                if (!target || isEnemy(piece, target)) {
                                    moves.push({ fromR: r, fromC: c, toR: targetR, toC: targetC, type: 'normal' });
                                }
                            }
                        });
                    } else {
                        const dir = isWhite ? -1 : 1;
                        if (isOnBoard(r + dir, c) && !currentBoard[r + dir][c]) {
                            moves.push({ fromR: r, fromC: c, toR: r + dir, toC: c, type: 'normal' });
                            if (r === (isWhite ? (boardSize - 2) : 1) && !currentBoard[r + dir * 2][c] && !currentBoard[r + dir][c]) {
                                moves.push({ fromR: r, fromC: c, toR: r + dir * 2, toC: c, type: 'normal' });
                            }
                        }
                        [-1, 1].forEach(dc => {
                            if (isOnBoard(r + dir, c + dc)) {
                                const target = currentBoard[r + dir][c + dc];
                                if (target && isEnemy(piece, target)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dir, toC: c + dc, type: 'normal' });
                                }
                            }
                        });
                    }
                    break;

                case 'r':
                    processSlidingMoves(r, c, rookDirs, piece, currentBoard, moves);
                    if (lvl4) {
                        knightOffsets.forEach(([dr, dc]) => {
                            if (isOnBoard(r + dr, c + dc)) {
                                const target = currentBoard[r + dr][c + dc];
                                if (!target || isEnemy(piece, target)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                                }
                            }
                        });
                    }
                    break;

                case 'b':
                    if (lvl5) processBouncingBishops(r, c, bishopDirs, piece, currentBoard, moves);
                    else processSlidingMoves(r, c, bishopDirs, piece, currentBoard, moves);
                    break;

                case 'q':
                    processSlidingMoves(r, c, [...rookDirs, ...bishopDirs], piece, currentBoard, moves);
                    if (lvl3) {
                        knightOffsets.forEach(([dr, dc]) => {
                            if (isOnBoard(r + dr, c + dc)) {
                                const target = currentBoard[r + dr][c + dc];
                                if (!target || isEnemy(piece, target)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                                }
                            }
                        });
                    }
                    break;

                case 'n':
                    knightOffsets.forEach(([dr, dc]) => {
                        if (isOnBoard(r + dr, c + dc)) {
                            const target = currentBoard[r + dr][c + dc];
                            if (!target || isEnemy(piece, target)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                            }
                        }
                    });
                    break;

                case 'k':
                    [...rookDirs, ...bishopDirs].forEach(([dr, dc]) => {
                        if (isOnBoard(r + dr, c + dc)) {
                            const target = currentBoard[r + dr][c + dc];
                            if (!target || isEnemy(piece, target)) {
                                moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                            }
                        }
                    });
                    if (lvl7) {
                        for (let tr = 0; tr < boardSize; tr++) {
                            for (let tc = 0; tc < boardSize; tc++) {
                                const targetPiece = currentBoard[tr][tc];
                                if (targetPiece && !isEnemy(piece, targetPiece) && targetPiece.toLowerCase() !== 'k') {
                                    moves.push({ fromR: r, fromC: c, toR: tr, toC: tc, type: 'swap' });
                                }
                            }
                        }
                    }
                    break;

                case 'g':
                    for (let tr = 0; tr < boardSize; tr++) {
                        for (let tc = 0; tc < boardSize; tc++) {
                            const targetPiece = currentBoard[tr][tc];
                            if (targetPiece && !isEnemy(piece, targetPiece) && (tr !== r || tc !== c)) {
                                const targetIsWhite = targetPiece === targetPiece.toUpperCase();
                                const frontOffset = targetIsWhite ? -1 : 1; 
                                const frontR = tr + frontOffset;
                                
                                if (isOnBoard(frontR, tc)) {
                                    const squareContent = currentBoard[frontR][tc];
                                    // Can deploy to empty spaces OR take enemy pieces occupying those tiles
                                    if (!squareContent || isEnemy(piece, squareContent)) {
                                        if (!moves.some(m => m.toR === frontR && m.toC === tc)) {
                                            moves.push({ fromR: r, fromC: c, toR: frontR, toC: tc, type: 'normal' });
                                        }
                                    }
                                }
                            }
                        }
                    }
                    break;
            }
            return moves;
        }

        function processSlidingMoves(r, c, directions, piece, currentBoard, moveList) {
            directions.forEach(([dr, dc]) => {
                let currR = r + dr, currC = c + dc;
                while (isOnBoard(currR, currC)) {
                    const target = currentBoard[currR][currC];
                    if (!target) {
                        moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                    } else {
                        if (isEnemy(piece, target)) {
                            moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                        }
                        break;
                    }
                    currR += dr; currC += dc;
                }
            });
        }

        function processBouncingBishops(r, c, directions, piece, currentBoard, moveList) {
            directions.forEach(([dr, dc]) => {
                let currR = r + dr, currC = c + dc, currentDr = dr, currentDc = dc, bounceCount = 0;
                let stepsGuard = 0; 
                while (bounceCount <= 2 && stepsGuard < 64) {
                    stepsGuard++;
                    let hitWall = false;
                    
                    if (currR < 0) { currentDr = 1; currR = 1; hitWall = true; }
                    else if (currR >= boardSize) { currentDr = -1; currR = boardSize - 2; hitWall = true; }
                    
                    if (currC < 0) { currentDc = 1; currC = 1; hitWall = true; }
                    else if (currC >= boardSize) { currentDc = -1; currC = boardSize - 2; hitWall = true; }
                    
                    if (hitWall) { 
                        bounceCount++; 
                        if (!isOnBoard(currR, currC)) break; 
                    }

                    const target = currentBoard[currR][currC];
                    if (!target) {
                        moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                    } else {
                        if ((currR !== r || currC !== c) && isEnemy(piece, target)) {
                            moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                        }
                        break;
                    }
                    currR += currentDr; currC += currentDc;
                }
            });
        }

        function isOnBoard(r, c) { return r >= 0 && r < boardSize && c >= 0 && c < boardSize; }
        function isEnemy(p1, p2) { return (p1 === p1.toUpperCase()) !== (p2 === p2.toUpperCase()); }

        function executeMove(targetBoard, move) {
            const piece = targetBoard[move.fromR][move.fromC];
            const originalSlipped = itemSlippedState[move.fromR][move.fromC];
            
            if (move.type === 'swap' && targetBoard[move.toR][move.toC]) {
                const targetPiece = targetBoard[move.toR][move.toC];
                const targetSlipped = itemSlippedState[move.toR][move.toC];
                
                targetBoard[move.toR][move.toC] = piece;
                targetBoard[move.fromR][move.fromC] = targetPiece;
                
                itemSlippedState[move.toR][move.toC] = originalSlipped;
                itemSlippedState[move.fromR][move.fromC] = targetSlipped;
            } else {
                targetBoard[move.toR][move.toC] = piece;
                targetBoard[move.fromR][move.fromC] = '';
                
                itemSlippedState[move.fromR][move.fromC] = null;
                if (iceLayout[move.toR][move.toC]) {
                    itemSlippedState[move.toR][move.toC] = turn; 
                } else {
                    itemSlippedState[move.toR][move.toC] = null;
                }
            }
        }

        function processSlipTurnRecovery(currentTurn) {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (itemSlippedState[r][c] === currentTurn) {
                        itemSlippedState[r][c] = null;
                    }
                }
            }
        }

        function checkGameEnd() {
            let whiteKingFound = false;
            let blackKingFound = false;
            
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (board[r][c] === 'K') whiteKingFound = true;
                    if (board[r][c] === 'k') blackKingFound = true;
                }
            }
            
            if (!whiteKingFound || !blackKingFound) {
                gameOver = true;
                if (!whiteKingFound) {
                    statusElem.textContent = "Black Wins by Regicide!";
                    statusElem.style.color = "#e74c3c";
                } else {
                    statusElem.textContent = "White Wins by Regicide!";
                    statusElem.style.color = "#2ecc71";
                }
                return true;
            }
            return false;
        }

        /* ---------------- DYNAMIC AI ENGINE TIERS ---------------- */
        const pieceWeight = { 'p': 10, 'n': 40, 'b': 42, 'r': 60, 'q': 115, 'g': 50, 'k': 50000 };

        function triggerAiCalculation() {
            if (gameOver) return;
            
            let rootMoves = getAllMovesForSide(board, 'b');
            if (rootMoves.length === 0) {
                turn = 'w';
                updateStatusMessage();
                return;
            }

            const difficulty = aiDiffSelect.value;
            let chosenMove = null;

            if (difficulty === 'novice') {
                chosenMove = rootMoves[Math.floor(Math.random() * rootMoves.length)];
            }
            else if (difficulty === 'casual') {
                let highestImmediateValue = -Infinity;
                let topCasualMoves = [];
                
                rootMoves.forEach(m => {
                    let target = board[m.toR][m.toC];
                    let currentScore = target ? (pieceWeight[target.toLowerCase()] || 0) : 0;
                    if (currentScore > highestImmediateValue) {
                        highestImmediateValue = currentScore;
                        topCasualMoves = [m];
                    } else if (currentScore === highestImmediateValue) {
                        topCasualMoves.push(m);
                    }
                });
                chosenMove = topCasualMoves[Math.floor(Math.random() * topCasualMoves.length)];
            }
            else {
                let searchDepth = (difficulty === 'grandmaster') ? 4 : 3;
                let supremeScore = -Infinity;
                let bestMovesGroup = [];

                for (let i = 0; i < rootMoves.length; i++) {
                    let currentMove = rootMoves[i];
                    
                    if (board[currentMove.toR][currentMove.toC] === 'K') {
                        chosenMove = currentMove;
                        break;
                    }

                    let ghostBoard = board.map(row => [...row]);
                    ghostBoard[currentMove.toR][currentMove.toC] = ghostBoard[currentMove.fromR][currentMove.fromC];
                    ghostBoard[currentMove.fromR][currentMove.fromC] = '';

                    let evaluationScore = minimaxSearch(ghostBoard, searchDepth - 1, -Infinity, Infinity, false);
                    
                    if (currentMove.toR >= (boardSize / 2 - 1) && currentMove.toR <= (boardSize / 2 + 1)) evaluationScore += 0.3;
                    if (board[currentMove.fromR][currentMove.fromC] === 'p') evaluationScore += (currentMove.toR * 0.1); 

                    if (evaluationScore > supremeScore) {
                        supremeScore = evaluationScore;
                        bestMovesGroup = [currentMove];
                    } else if (evaluationScore === supremeScore) {
                        bestMovesGroup.push(currentMove);
                    }
                }
                
                if (!chosenMove && bestMovesGroup.length > 0) {
                    chosenMove = bestMovesGroup[Math.floor(Math.random() * bestMovesGroup.length)];
                }
            }

            if (!chosenMove) {
                chosenMove = rootMoves[Math.floor(Math.random() * rootMoves.length)];
            }

            processSlipTurnRecovery('b');
            animateAndExecuteMove(chosenMove);
        }

        function minimaxSearch(virtualBoard, depth, alpha, beta, maximizingSide) {
            let wk = false, bk = false;
            for(let r=0; r<boardSize; r++) {
                for(let c=0; c<boardSize; c++) {
                    if (virtualBoard[r][c] === 'K') wk = true;
                    if (virtualBoard[r][c] === 'k') bk = true;
                }
            }
            if (!wk) return 99999 + depth; 
            if (!bk) return -99999 - depth;
            if (depth === 0) return staticallyEvaluateBoard(virtualBoard);

            if (maximizingSide) {
                let moves = getAllMovesForSide(virtualBoard, 'b');
                if (moves.length === 0) return staticallyEvaluateBoard(virtualBoard);
                let highestValue = -Infinity;
                for (let i = 0; i < moves.length; i++) {
                    let bCopy = virtualBoard.map(row => [...row]);
                    bCopy[moves[i].toR][moves[i].toC] = bCopy[moves[i].fromR][moves[i].fromC];
                    bCopy[moves[i].fromR][moves[i].fromC] = '';
                    highestValue = Math.max(highestValue, minimaxSearch(bCopy, depth - 1, alpha, beta, false));
                    alpha = Math.max(alpha, highestValue);
                    if (beta <= alpha) break;
                }
                return highestValue;
            } else {
                let moves = getAllMovesForSide(virtualBoard, 'w');
                if (moves.length === 0) return staticallyEvaluateBoard(virtualBoard);
                let lowestValue = Infinity;
                for (let i = 0; i < moves.length; i++) {
                    let bCopy = virtualBoard.map(row => [...row]);
                    bCopy[moves[i].toR][moves[i].toC] = bCopy[moves[i].fromR][moves[i].fromC];
                    bCopy[moves[i].fromR][moves[i].fromC] = '';
                    lowestValue = Math.min(lowestValue, minimaxSearch(bCopy, depth - 1, alpha, beta, true));
                    beta = Math.min(beta, lowestValue);
                    if (beta <= alpha) break;
                }
                return lowestValue;
            }
        }

        function staticallyEvaluateBoard(vBoard) {
            let runningSum = 0;
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    let piece = vBoard[r][c];
                    if (piece) {
                        let type = piece.toLowerCase();
                        let numericalVal = pieceWeight[type] || 0;
                        
                        if (r >= 2 && r <= boardSize-3 && c >= 2 && c <= boardSize-3) {
                            numericalVal += 0.5; 
                        }

                        if (piece === piece.toLowerCase()) {
                            runningSum += numericalVal; 
                        } else {
                            runningSum -= numericalVal; 
                        }
                    }
                }
            }
            return runningSum;
        }

        function getAllMovesForSide(vBoard, side) {
            let compositeList = [];
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    let piece = vBoard[r][c];
                    if (piece) {
                        let matchesSide = (side === 'w') ? (piece === piece.toUpperCase()) : (piece === piece.toLowerCase());
                        if (matchesSide && itemSlippedState[r][c] === null) {
                            compositeList = compositeList.concat(getLegalMoves(r, c, vBoard));
                        }
                    }
                }
            }
            return compositeList;
        }

        /* ---------------- MATCH HISTORY GAMEPLAY REPLAY CONTROLS ---------------- */
        function activateReplayEngine() {
            isReplaying = true;
            replayIndex = gameHistory.length - 1;
            replayPanel.style.display = 'flex';
            updateReplayView();
        }

        function updateReplayView() {
            const currentSnapshot = gameHistory[replayIndex];
            board = currentSnapshot.boardState.map(row => [...row]);
            itemSlippedState = currentSnapshot.slippedState.map(row => [...row]);
            turn = currentSnapshot.activeTurn;

            drawBoard();
            updateStatusMessage();

            replayCounter.textContent = `Reviewing Move: ${replayIndex} / ${gameHistory.length - 1}`;

            btnFirst.disabled = (replayIndex === 0);
            btnPrev.disabled = (replayIndex === 0);
            btnNext.disabled = (replayIndex === gameHistory.length - 1);
            btnLast.disabled = (replayIndex === gameHistory.length - 1);
        }

        btnFirst.addEventListener('click', () => { replayIndex = 0; updateReplayView(); });
        btnPrev.addEventListener('click', () => { if (replayIndex > 0) { replayIndex--; updateReplayView(); } });
        btnNext.addEventListener('click', () => { if (replayIndex < gameHistory.length - 1) { replayIndex++; updateReplayView(); } });
        btnLast.addEventListener('click', () => { replayIndex = gameHistory.length - 1; updateReplayView(); });

        initializeGame();
    </script>
