<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take King Chess - Chaos Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: #ecf0f1;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { margin-bottom: 5px; }
        p { margin-top: 0; color: #bdc3c7; text-align: center; max-width: 500px;}
        
        /* Control Panel Layout */
        #control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background-color: #34495e;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 480px;
            transition: transform 0.2s ease;
        }
        
        /* Mode Toggle Button */
        #mode-toggle {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 0 #d35400;
        }
        #mode-toggle:hover { background-color: #f39c12; transform: scale(1.02); }
        #mode-toggle:active { transform: translateY(3px); box-shadow: none; }

        #level-slider {
            width: 100%;
            margin: 5px 0;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #level-slider:active { transform: scaleY(1.1); }

        #level-desc {
            font-size: 0.95rem;
            color: #f1c40f;
            min-height: 40px;
            font-weight: bold;
            text-align: center;
            transition: color 0.3s ease;
        }

        #status {
            font-size: 1.4rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2ecc71;
            padding: 5px 15px;
            border-radius: 4px;
            text-align: center;
            animation: pulse 2s infinite ease-in-out;
        }
        .white-turn { color: #ffffff !important; }
        .black-turn { color: #111111 !important; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 65px);
            grid-template-rows: repeat(8, 65px);
            border: 5px solid #34495e;
            box-shadow: 0 12px 28px rgba(0,0,0,0.4);
            position: relative;
        }
        .cell {
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s ease;
        }
        .light { background-color: #e0e4e8; }
        .dark { background-color: #88929a; }
        
        .slippery::after {
            content: '🧊';
            font-size: 14px;
            position: absolute;
            top: 2px;
            right: 2px;
            opacity: 0.7;
            z-index: 1;
            animation: iceGlimmer 3s infinite ease-in-out;
        }
        .slipped-piece {
            opacity: 0.4 !important;
            filter: grayscale(100%) contrast(150%) drop-shadow(0px 0px 8px #3498db) !important;
        }

        .piece {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            cursor: grab;
            animation: popIn 0.25s ease-out forwards;
            transition: transform 0.15s ease, filter 0.15s ease;
        }
        .piece:hover {
            transform: scale(1.08);
        }
        .piece:active { 
            cursor: grabbing; 
            transform: scale(1.15);
        }
        
        .piece-w { color: #ffffff; filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.75)); }
        .piece-b { color: #111111; filter: drop-shadow(0px 2px 2px rgba(255,255,255,0.2)); }
        
        /* Highlight Animations */
        .selected { 
            background-color: #2ecc71 !important; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .highlighted::before {
            content: '';
            width: 18px;
            height: 18px;
            background-color: rgba(46, 204, 113, 0.7);
            border-radius: 50%;
            position: absolute;
            z-index: 2;
            pointer-events: none;
            animation: targetPulse 1.5s infinite ease-out;
        }

        /* --- Keyframes --- */
        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }
        @keyframes targetPulse {
            0% { transform: scale(0.8); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
            100% { transform: scale(0.8); opacity: 0.6; }
        }
        @keyframes iceGlimmer {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.15) rotate(5deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Take King Chess</h1>
    <p>Capture the enemy King to win. Toggle between playing against a friend or testing your skills against the Grandmaster AI Engine!</p>
    
    <div id="control-panel">
        <button id="mode-toggle">Game Mode: Vs Friend (Local)</button>
        <hr style="width:100%; border:0; border-top:1px solid #5d6d7e; margin:5px 0;">
        <label for="level-slider" style="font-weight: bold; font-size: 1.1rem;">Game Rule Level: <span id="level-val">1</span></label>
        <input type="range" id="level-slider" min="1" max="8" value="1">
        <div id="level-desc">Level 1: Normal Chess. Standard movement rules apply.</div>
    </div>

    <div id="status" class="white-turn">White's Turn</div>
    <div id="chessboard"></div>

    <script>
        const boardElem = document.getElementById('chessboard');
        const statusElem = document.getElementById('status');
        const levelSlider = document.getElementById('level-slider');
        const levelValDisplay = document.getElementById('level-val');
        const levelDescDisplay = document.getElementById('level-desc');
        const modeToggleBtn = document.getElementById('mode-toggle');

        const symbols = {
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔',
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚'
        };

        let currentLevel = 1;
        let isAIMode = false; 

        const levelDescriptions = {
            1: "Level 1: Normal Chess. Standard movement rules apply.",
            2: "Level 2: Goblin Pawns! Pawns can move 1 or 2 squares forward or diagonally, jumping over blocking pieces.",
            3: "Level 3: Horse Queens. The traditional Queen gains full Knight movement attributes.",
            4: "Level 4: Phantom Rooks. Castles can leap over obstacles natively like Knights.",
            5: "Level 5: Kinetic Bishops. Clergy rebound and bank off the boundaries of the board matrix.",
            6: "Level 6: Perilous Ice. Stepping on frozen hazards traps pieces in place for 1 full turn.",
            7: "Level 7: Sovereign Swap. The Monarch can freely switch physical spaces with any active ally.",
            8: "Level 8: Total Chaos Rule! Every single variant capability across all levels unlocks concurrently."
        };

        let board = [];
        let itemSlippedState = Array(8).fill(null).map(() => Array(8).fill(null));
        let iceLayout = Array(8).fill(null).map(() => Array(8).fill(false));

        let turn = 'w'; 
        let selected = null; 
        let gameOver = false;

        // --- PST ENGINE ARRAYS ---
        const pawnPST = [[0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],[5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],[5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]];
        const knightPST = [[-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],[-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],[-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],[-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]];
        const bishopPST = [[-20,-10,-10,-10,-10,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,10,10,5,0,-10],[-10,5,5,10,10,5,5,-10],[-10,0,10,10,10,10,0,-10],[-10,10,10,10,10,10,10,-10],[-10,5,0,0,0,0,5,-10],[-20,-10,-10,-10,-10,-10,-10,-20]];
        const rookPST = [[0,0,0,0,0,0,0,0],[5,10,10,10,10,10,10,5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[0,0,0,5,5,0,0,0]];
        const queenPST = [[-20,-10,-10,-5,-5,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,5,5,5,0,-10],[-5,0,5,5,5,5,0,-5],[0,0,5,5,5,5,0,-5],[-10,5,5,5,5,5,0,-10],[-10,0,5,0,0,0,0,-10],[-20,-10,-10,-5,-5,-10,-10,-20]];
        const kingPST = [[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-20,-30,-30,-40,-40,-30,-30,-20],[-10,-20,-20,-20,-20,-20,-20,-10],[20,20,0,0,0,0,20,20],[20,30,10,0,0,10,30,20]];

        function initializeGame() {
            board = [
                ['r','n','b','q','k','b','n','r'],
                ['p','p','p','p','p','p','p','p'],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['P','P','P','P','P','P','P','P'],
                ['R','N','B','Q','K','B','N','R']
            ];
            turn = 'w';
            selected = null;
            gameOver = false;
            itemSlippedState = Array(8).fill(null).map(() => Array(8).fill(null));
            
            iceLayout = Array(8).fill(null).map(() => Array(8).fill(false));
            if (currentLevel === 6 || currentLevel === 8) {
                let spaces = [[2,2], [2,5], [3,3], [3,4], [4,3], [4,4], [5,2], [5,5]];
                spaces.forEach(([r,c]) => { iceLayout[r][c] = true; });
            }
            
            updateStatusDisplay();
            drawBoard();
        }

        function updateStatusDisplay() {
            if (gameOver) return;
            if (turn === 'w') {
                statusElem.textContent = "White's Turn";
                statusElem.className = "white-turn";
            } else {
                statusElem.textContent = isAIMode ? "AI is looking deep..." : "Black's Turn";
                statusElem.className = "black-turn";
            }
        }

        function drawBoard() {
            boardElem.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell', (r + c) % 2 === 0 ? 'light' : 'dark');
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (iceLayout[r][c]) cell.classList.add('slippery');

                    cell.addEventListener('dragover', onDragOver);
                    cell.addEventListener('drop', onDrop);
                    cell.addEventListener('click', onSquareClick);

                    const pieceType = board[r][c];
                    if (pieceType) {
                        const pieceDiv = document.createElement('div');
                        pieceDiv.classList.add('piece');
                        pieceDiv.textContent = symbols[pieceType];
                        
                        const isWhite = pieceType === pieceType.toUpperCase();
                        pieceDiv.classList.add(isWhite ? 'piece-w' : 'piece-b');
                        
                        if (itemSlippedState[r][c]) pieceDiv.classList.add('slipped-piece');
                        
                        if (!gameOver && ((turn === 'w' && isWhite) || (turn === 'b' && !isWhite && !isAIMode))) {
                            pieceDiv.setAttribute('draggable', 'true');
                            pieceDiv.addEventListener('dragstart', (e) => onDragStart(e, r, c));
                        }
                        
                        cell.appendChild(pieceDiv);
                    }
                    boardElem.appendChild(cell);
                }
            }
        }

        modeToggleBtn.addEventListener('click', () => {
            isAIMode = !isAIMode;
            modeToggleBtn.textContent = isAIMode ? "Game Mode: Vs Grandmaster AI" : "Game Mode: Vs Friend (Local)";
            modeToggleBtn.style.backgroundColor = isAIMode ? "#9b59b6" : "#e67e22";
            modeToggleBtn.style.boxShadow = isAIMode ? "0 3px 0 #8e44ad" : "0 3px 0 #d35400";
            initializeGame();
        });

        levelSlider.addEventListener('input', (e) => {
            currentLevel = parseInt(e.target.value);
            levelValDisplay.textContent = currentLevel;
            levelDescDisplay.textContent = levelDescriptions[currentLevel];
            initializeGame();
        });

        function onDragStart(e, r, c) {
            if (gameOver || (turn === 'b' && isAIMode)) { e.preventDefault(); return; }
            selectPiece(r, c);
        }

        function onDragOver(e) { e.preventDefault(); }

        function onDrop(e) {
            e.preventDefault();
            const cell = e.currentTarget;
            attemptMove(parseInt(cell.dataset.row), parseInt(cell.dataset.col));
        }

        function onSquareClick(e) {
            if (gameOver || (turn === 'b' && isAIMode)) return;
            const cell = e.currentTarget;
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);

            if (selected) {
                if (attemptMove(r, c)) return;
            }
            
            const piece = board[r][c];
            const isWhitePiece = piece && piece === piece.toUpperCase();
            
            if (piece && ((turn === 'w' && isWhitePiece) || (turn === 'b' && !isWhitePiece))) {
                selectPiece(r, c);
            } else {
                selected = null;
                clearHighlights();
            }
        }

        function selectPiece(r, c) {
            clearHighlights();
            selected = { r, c };
            document.querySelector(`[data-row="${r}"][data-col="${c}"]`)?.classList.add('selected');

            getLegalMoves(r, c, board).forEach(m => {
                document.querySelector(`[data-row="${m.toR}"][data-col="${m.toC}"]`)?.classList.add('highlighted');
            });
        }

        function attemptMove(r, c) {
            if (!selected) return false;
            const moves = getLegalMoves(selected.r, selected.c, board);
            const validMove = moves.find(m => m.toR === r && m.toC === c);

            if (validMove) {
                processSlipTurnRecovery(turn);
                executeMove(board, validMove);
                selected = null;
                clearHighlights();
                
                if (!checkGameEnd()) {
                    turn = (turn === 'w') ? 'b' : 'w';
                    updateStatusDisplay();
                    drawBoard();
                    
                    if (isAIMode && turn === 'b') {
                        setTimeout(makeAIMove, 150);
                    }
                } else {
                    drawBoard();
                }
                return true;
            }
            return false;
        }

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected', 'highlighted'));
        }

        // --- RULE VARIANT CALCULATOR ---
        function getLegalMoves(r, c, currentBoard) {
            const piece = currentBoard[r][c];
            if (!piece) return [];
            
            const moves = [];
            const isWhite = piece === piece.toUpperCase();
            const type = piece.toLowerCase();
            const isSlipped = itemSlippedState[r][c] !== null;

            const rookDirs = [[1,0], [-1,0], [0,1], [0,-1]];
            const bishopDirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
            const knightMoves = [[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]];

            const lvl2 = (currentLevel === 2 || currentLevel === 8);
            const lvl3 = (currentLevel === 3 || currentLevel === 8);
            const lvl4 = (currentLevel === 4 || currentLevel === 8);
            const lvl5 = (currentLevel === 5 || currentLevel === 8);
            const lvl7 = (currentLevel === 7 || currentLevel === 8);

            switch (type) {
                case 'p':
                    const forward = isWhite ? -1 : 1;
                    if (lvl2) {
                        const goblinOffsets = [
                            [forward, 0], [forward * 2, 0],     
                            [forward, -1], [forward, 1],       
                            [forward * 2, -2], [forward * 2, 2] 
                        ];
                        goblinOffsets.forEach(([dr, dc]) => {
                            const targetR = r + dr, targetC = c + dc;
                            if (isOnBoard(targetR, targetC)) {
                                const target = currentBoard[targetR][targetC];
                                if (!target || (isEnemy(piece, target) && !isSlipped)) {
                                    moves.push({ fromR: r, fromC: c, toR: targetR, toC: targetC, type: 'normal' });
                                }
                            }
                        });
                    } else {
                        if (isOnBoard(r + forward, c) && !currentBoard[r + forward][c]) {
                            moves.push({ fromR: r, fromC: c, toR: r + forward, toC: c, type: 'normal' });
                            if (r === (isWhite ? 6 : 1) && !currentBoard[r + forward * 2][c]) {
                                moves.push({ fromR: r, fromC: c, toR: r + forward * 2, toC: c, type: 'normal' });
                            }
                        }
                        [-1, 1].forEach(dc => {
                            if (isOnBoard(r + forward, c + dc)) {
                                const target = currentBoard[r + forward][c + dc];
                                if (target && isEnemy(piece, target) && !isSlipped) {
                                    moves.push({ fromR: r, fromC: c, toR: r + forward, toC: c + dc, type: 'normal' });
                                }
                            }
                        });
                    }
                    break;

                case 'r':
                    processSlidingMoves(r, c, rookDirs, piece, currentBoard, moves, isSlipped);
                    if (lvl4) {
                        knightMoves.forEach(([dr, dc]) => {
                            if (isOnBoard(r + dr, c + dc)) {
                                const target = currentBoard[r + dr][c + dc];
                                if (!target || (isEnemy(piece, target) && !isSlipped)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                                }
                            }
                        });
                    }
                    break;

                case 'b':
                    if (lvl5) processBouncingBishops(r, c, bishopDirs, piece, currentBoard, moves, isSlipped);
                    else processSlidingMoves(r, c, bishopDirs, piece, currentBoard, moves, isSlipped);
                    break;

                case 'q':
                    processSlidingMoves(r, c, [...rookDirs, ...bishopDirs], piece, currentBoard, moves, isSlipped);
                    if (lvl3) {
                        knightMoves.forEach(([dr, dc]) => {
                            if (isOnBoard(r + dr, c + dc)) {
                                const target = currentBoard[r + dr][c + dc];
                                if (!target || (isEnemy(piece, target) && !isSlipped)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                                }
                            }
                        });
                    }
                    break;

                case 'n':
                    knightMoves.forEach(([dr, dc]) => {
                        if (isOnBoard(r + dr, c + dc)) {
                            const target = currentBoard[r + dr][c + dc];
                            if (!target || (isEnemy(piece, target) && !isSlipped)) {
                                    moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                            }
                        }
                    });
                    break;

                case 'k':
                    [...rookDirs, ...bishopDirs].forEach(([dr, dc]) => {
                        if (isOnBoard(r + dr, c + dc)) {
                            const target = currentBoard[r + dr][c + dc];
                            if (!target || (isEnemy(piece, target) && !isSlipped)) {
                                moves.push({ fromR: r, fromC: c, toR: r + dr, toC: c + dc, type: 'normal' });
                            }
                        }
                    });
                    if (lvl7) {
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                const targetPiece = currentBoard[tr][tc];
                                if (targetPiece && !isEnemy(piece, targetPiece) && targetPiece.toLowerCase() !== 'k') {
                                    moves.push({ fromR: r, fromC: c, toR: tr, toC: tc, type: 'swap' });
                                }
                            }
                        }
                    }
                    break;
            }
            return moves;
        }

        function processSlidingMoves(r, c, directions, piece, currentBoard, moveList, isSlipped) {
            directions.forEach(([dr, dc]) => {
                let currR = r + dr, currC = c + dc;
                while (isOnBoard(currR, currC)) {
                    const target = currentBoard[currR][currC];
                    if (!target) {
                        moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                    } else {
                        if (isEnemy(piece, target) && !isSlipped) {
                            moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                        }
                        break;
                    }
                    currR += dr; currC += dc;
                }
            });
        }

        function processBouncingBishops(r, c, directions, piece, currentBoard, moveList, isSlipped) {
            directions.forEach(([dr, dc]) => {
                let currR = r + dr, currC = c + dc, currentDr = dr, currentDc = dc, bounceCount = 0;
                while (bounceCount <= 2) {
                    let hitWall = false;
                    if (currR < 0 || currR >= 8) { currentDr = -currentDr; currR += currentDr * 2; hitWall = true; }
                    if (currC < 0 || currC >= 8) { currentDc = -currentDc; currC += currentDc * 2; hitWall = true; }
                    if (hitWall) { bounceCount++; if (!isOnBoard(currR, currC)) break; }

                    const target = currentBoard[currR][currC];
                    if (!target) {
                        moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                    } else {
                        if ((currR !== r || currC !== c) && isEnemy(piece, target) && !isSlipped) {
                            moveList.push({ fromR: r, fromC: c, toR: currR, toC: currC, type: 'normal' });
                        }
                        break;
                    }
                    currR += currentDr; currC += currentDc;
                }
            });
        }

        function isOnBoard(r, c) { return r >= 0 && r < 8 && c >= 0 && c < 8; }
        function isEnemy(p1, p2) { return (p1 === p1.toUpperCase()) !== (p2 === p2.toUpperCase()); }

        function executeMove(targetBoard, move) {
            const piece = targetBoard[move.fromR][move.fromC];
            const activeFreeze = itemSlippedState[move.fromR][move.fromC];

            if (move.type === 'swap') {
                const secondaryPiece = targetBoard[move.toR][move.toC];
                const secondaryFreeze = itemSlippedState[move.toR][move.toC];
                targetBoard[move.toR][move.toC] = piece;
                targetBoard[move.fromR][move.fromC] = secondaryPiece;
                itemSlippedState[move.toR][move.toC] = activeFreeze;
                itemSlippedState[move.fromR][move.fromC] = secondaryFreeze;
            } else {
                targetBoard[move.toR][move.toC] = piece;
                targetBoard[move.fromR][move.fromC] = '';
                itemSlippedState[move.toR][move.toC] = activeFreeze;
                itemSlippedState[move.fromR][move.fromC] = null;

                if (piece === 'P' && move.toR === 0) targetBoard[move.toR][move.toC] = 'Q';
                if (piece === 'p' && move.toR === 7) targetBoard[move.toR][move.toC] = 'q';
            }

            if ((currentLevel === 6 || currentLevel === 8) && iceLayout[move.toR][move.toC]) {
                itemSlippedState[move.toR][move.toC] = targetBoard[move.toR][move.toC] === targetBoard[move.toR][move.toC].toUpperCase() ? 'w' : 'b';
            }
        }

        function processSlipTurnRecovery(color) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (itemSlippedState[r][c] === color) itemSlippedState[r][c] = null;
                }
            }
        }

        function checkGameEnd() {
            let wK = false, bK = false;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] === 'K') wK = true;
                    if (board[r][c] === 'k') bK = true;
                }
            }
            if (!wK) { 
                statusElem.textContent = isAIMode ? "DEFEAT — THE AI TOOK YOUR KING!" : "BLACK WINS! THE WHITE KING HAS BEEN CAPTURED!"; 
                statusElem.style.color = "#e74c3c"; gameOver = true; return true; 
            }
            if (!bK) { 
                statusElem.textContent = isAIMode ? "VICTORY — YOU CAPTURED THE AI MONARCH!" : "WHITE WINS! THE BLACK KING HAS BEEN CAPTURED!"; 
                statusElem.style.color = "#f1c40f"; gameOver = true; return true; 
            }
            return false;
        }

        function getAllMoves(currentBoard, color) {
            let moves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = currentBoard[r][c];
                    if (piece && ((color === 'w' && piece === piece.toUpperCase()) || (color === 'b' && piece === piece.toLowerCase()))) {
                        moves.push(...getLegalMoves(r, c, currentBoard));
                    }
                }
            }
            return moves.sort((a, b) => (currentBoard[b.toR][b.toC] ? 100 : 0) - (currentBoard[a.toR][a.toC] ? 100 : 0));
        }

        function evaluateBoard(currentBoard) {
            const values = { 'p': 100, 'n': 320, 'b': 330, 'r': 500, 'q': 900, 'k': 20000 };
            let total = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = currentBoard[r][c];
                    if (!piece) continue;
                    const isWhite = piece === piece.toUpperCase();
                    const type = piece.toLowerCase();
                    let score = values[type] || 0;
                    if (type === 'p') score += isWhite ? pawnPST[r][c] : pawnPST[7 - r][c];
                    else if (type === 'n') score += isWhite ? knightPST[r][c] : knightPST[7 - r][c];
                    else if (type === 'b') score += isWhite ? bishopPST[r][c] : bishopPST[7 - r][c];
                    else if (type === 'r') score += isWhite ? rookPST[r][c] : rookPST[7 - r][c];
                    else if (type === 'q') score += isWhite ? queenPST[r][c] : queenPST[7 - r][c];
                    else if (type === 'k') score += isWhite ? kingPST[r][c] : kingPST[7 - r][c];
                    total += isWhite ? score : -score;
                }
            }
            return total;
        }

        function minimax(currentBoard, depth, alpha, beta, isMaximizing) {
            let wK = false, bK = false;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(currentBoard[r][c] === 'K') wK = true;
                    if(currentBoard[r][c] === 'k') bK = true;
                }
            }
            if (!wK) return -9999999;
            if (!bK) return 9999999;
            if (depth === 0) return evaluateBoard(currentBoard);

            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let move of getAllMoves(currentBoard, 'w')) {
                    let temp = currentBoard.map(row => [...row]);
                    executeMove(temp, move);
                    maxEval = Math.max(maxEval, minimax(temp, depth - 1, alpha, beta, false));
                    alpha = Math.max(alpha, maxEval);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let move of getAllMoves(currentBoard, 'b')) {
                    let temp = currentBoard.map(row => [...row]);
                    executeMove(temp, move);
                    minEval = Math.min(minEval, minimax(temp, depth - 1, alpha, beta, true));
                    beta = Math.min(beta, minEval);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function makeAIMove() {
            if (gameOver || !isAIMode) return;
            processSlipTurnRecovery('b');
            const moves = getAllMoves(board, 'b');
            if (moves.length === 0) return;

            let bestMove = moves.find(m => board[m.toR][m.toC] === 'K') || null;

            if (!bestMove) {
                let bestScore = Infinity;
                let depthLimit = (currentLevel === 5 || currentLevel === 8) ? 2 : 3;
                for (let move of moves) {
                    let temp = board.map(row => [...row]);
                    executeMove(temp, move);
                    let score = minimax(temp, depthLimit, -Infinity, Infinity, true);
                    if (score < bestScore) { bestScore = score; bestMove = move; }
                }
            }

            executeMove(board, bestMove || moves[0]);
            if (!checkGameEnd()) {
                turn = 'w';
                updateStatusDisplay();
            }
            drawBoard();
        }

        initializeGame();
    </script>
